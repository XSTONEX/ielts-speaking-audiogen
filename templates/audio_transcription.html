  <script>
    (function () {
      try {
        var preference = localStorage.getItem('ui-theme');
        if (preference !== 'light' && preference !== 'dark' && preference !== 'system') preference = 'system';
        var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = preference === 'system' ? (isDark ? 'dark' : 'light') : preference;
        var root = document.documentElement;
        root.dataset.themePreference = preference;
        root.dataset.theme = theme;
        root.style.colorScheme = theme;
        root.classList.toggle('dark', theme === 'dark');
      } catch (error) {
        document.documentElement.dataset.themePreference = 'system';
        document.documentElement.dataset.theme = 'light';
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>

<body class="theme-page page-audio-transcription">
  <div class="container">
    <div class="header">
      <a href="/" class="back-btn">
        <span>←</span> 返回首页
      </a>
      <h1>音频转文本</h1>
      <p>使用AI技术将音频文件转换为文本内容</p>
    </div>
    
    <div class="main-content">
      <!-- 模式切换 -->
      <div class="mode-selector">
        <button class="mode-btn active" id="recordModeBtn" onclick="switchMode('record')">
          <span class="mode-icon">🎙️</span>
          <span class="mode-text">录音模式</span>
        </button>
        <button class="mode-btn" id="uploadModeBtn" onclick="switchMode('upload')">
          <span class="mode-icon">📁</span>
          <span class="mode-text">上传模式</span>
        </button>
      </div>
      
      <!-- 录音区域 -->
      <div class="recording-section" id="recordingSection">
        <div class="recording-icon" id="recordingIcon">🎙️</div>
        <div class="recording-text" id="recordingText">点击开始录音</div>
        <div class="recording-hint">支持浏览器录音，录制完成后自动转录为文本</div>
        
        <input type="text" class="title-input" id="titleInput" placeholder="输入录音标题（可选）">
        
        <!-- 录音控制按钮 -->
        <div class="recording-controls">
          <button class="record-btn" id="startRecordBtn">
            <span class="btn-icon">🎙️</span>
            <span class="btn-text">开始录音</span>
          </button>
          <button class="record-btn secondary" id="stopRecordBtn" style="display: none;">
            <span class="btn-icon">⏹️</span>
            <span class="btn-text">停止录音</span>
          </button>
          <button class="record-btn secondary" id="reRecordBtn" style="display: none;">
            <span class="btn-icon">🔄</span>
            <span class="btn-text">重新录音</span>
          </button>
          <button class="record-btn primary" id="uploadRecordBtn" style="display: none;">
            <span class="btn-icon">📤</span>
            <span class="btn-text">上传转录</span>
          </button>
        </div>
        
        <!-- 录音状态显示 -->
        <div class="recording-status" id="recordingStatus" style="display: none;">
          <div class="status-text" id="statusText">准备录音...</div>
          <div class="recording-time" id="recordingTime">00:00</div>
        </div>
        
        <!-- 音频波形可视化 -->
        <div class="audio-visualizer" id="audioVisualizer" style="display: none;">
          <canvas id="visualizerCanvas" width="400" height="100"></canvas>
        </div>
        
        <!-- 录音预览 -->
        <div class="audio-preview" id="audioPreview" style="display: none;">
          <audio controls id="previewAudio"></audio>
          <div class="preview-info">
            <span id="previewDuration">时长: --:--</span>
            <span id="previewSize">大小: -- KB</span>
          </div>
        </div>
      </div>
      
      <!-- 上传区域 -->
      <div class="upload-section" id="uploadSection" style="display: none;">
        <div class="upload-icon" id="uploadIcon">📁</div>
        <div class="upload-text" id="uploadText">拖拽音频文件到此处或点击上传</div>
        <div class="upload-hint">支持 MP3, WAV, M4A, FLAC, OGG, MP4, WebM 等格式，最大 25MB</div>
        
        <input type="text" class="title-input" id="uploadTitleInput" placeholder="输入音频标题（可选）">
        
        <div class="file-input-wrapper">
          <input type="file" class="file-input" id="fileInput" accept="audio/*">
          <button class="upload-btn">选择音频文件</button>
        </div>
        
        <!-- 文件预览 -->
        <div class="file-preview" id="filePreview" style="display: none;">
          <div class="file-info">
            <div class="file-name" id="fileName"></div>
            <div class="file-details">
              <span id="fileSize"></span>
              <span id="fileType"></span>
            </div>
          </div>
          <div class="file-actions">
            <button class="action-btn btn-secondary" onclick="clearSelectedFile()">
              <span>🗑️</span> 清除
            </button>
            <button class="action-btn btn-primary" onclick="uploadSelectedFile()">
              <span>📤</span> 上传转录
            </button>
          </div>
        </div>
      </div>
      
      <!-- 加载状态 -->
      <div class="loading" id="loadingSection">
        <div class="spinner"></div>
        <p>正在转录音频，请稍候...</p>

        <h2 class="section-title">
          <span>📝</span> 转录记录

        <div id="transcriptionsList">

        </div>
      </div>

  <script>
    let currentToken = null;
    let currentUser = null;
    
    // 录音相关变量
    let mediaRecorder = null;
    let audioChunks = [];
    let recordingStartTime = null;
    let recordingTimer = null;
    let audioContext = null;
    let analyser = null;
    let microphone = null;
    let visualizerAnimationId = null;
    let recordedBlob = null;
    
    // 轮询相关变量
    let pollingInterval = null;
    let processingTranscriptions = new Set(); // 跟踪正在处理的转录ID
    
    // 上传相关变量
    let selectedFile = null;
    let currentMode = 'record'; // 'record' 或 'upload'
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      checkAuth(); // checkAuth内部会调用loadTranscriptions
      initializeRecording();
      initializeUpload();
      startPolling(); // 开始轮询
    });
    
    // 页面卸载时清理
    window.addEventListener('beforeunload', function() {
      stopPolling();
    });
    
    // 检查认证状态
    function checkAuth() {
      const token = localStorage.getItem('authToken');
      if (!token) {
        showToast('请先登录', 'error');
        setTimeout(() => {
          window.location.href = '/login';
        }, 1500);
        return;
      }
      
      fetch('/verify_token', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({token: token})
      })
      .then(response => response.json())
      .then(data => {
        if (data.valid) {
          currentToken = token;
          if (data.user) {
            currentUser = data.user;
          }
          // 认证成功后加载转录列表
          loadTranscriptions();
        } else {
          localStorage.removeItem('authToken');
          localStorage.removeItem('currentUser');
          showToast('登录已过期，请重新登录', 'error');
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        }
      })
      .catch(error => {
        console.error('Auth check failed:', error);
        showToast('认证检查失败，请重新登录', 'error');
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
      });
    }
    
    // 初始化录音功能
    function initializeRecording() {
      const startBtn = document.getElementById('startRecordBtn');
      const stopBtn = document.getElementById('stopRecordBtn');
      const reRecordBtn = document.getElementById('reRecordBtn');
      const uploadBtn = document.getElementById('uploadRecordBtn');
      
      startBtn.addEventListener('click', startRecording);
      stopBtn.addEventListener('click', stopRecording);
      reRecordBtn.addEventListener('click', resetRecording);
      uploadBtn.addEventListener('click', uploadRecording);
      
      // 检查浏览器支持
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('您的浏览器不支持录音功能', 'error');
        startBtn.disabled = true;
      }
    }
    
    // 开始录音
    async function startRecording() {
      try {
        // 请求麦克风权限
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            sampleRate: 44100
          } 
        });
        
        // 设置录音器
        mediaRecorder = new MediaRecorder(stream, {
          mimeType: 'audio/webm;codecs=opus'
        });
        
        audioChunks = [];
        
        mediaRecorder.ondataavailable = function(event) {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = function() {
          recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
          showAudioPreview(recordedBlob);
          stream.getTracks().forEach(track => track.stop());
          stopVisualizer();
        };
        
        // 开始录音
        mediaRecorder.start(100); // 每100ms收集一次数据
        recordingStartTime = Date.now();
        
        // 更新UI
        updateRecordingUI('recording');
        startTimer();
        startVisualizer(stream);
        
        showToast('录音已开始', 'success');
        
      } catch (error) {
        console.error('录音启动失败:', error);
        if (error.name === 'NotAllowedError') {
          showToast('请允许访问麦克风权限', 'error');
        } else {
          showToast('录音启动失败，请重试', 'error');
        }
      }
    }
    
    // 停止录音
    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        updateRecordingUI('stopped');
        stopTimer();
        showToast('录音已停止', 'success');
      }
    }
    
    // 重新录音
    function resetRecording() {
      recordedBlob = null;
      audioChunks = [];
      updateRecordingUI('ready');
      hideAudioPreview();
      document.getElementById('titleInput').value = '';
    }
    
    // 上传录音
    function uploadRecording() {
      if (!recordedBlob) {
        showToast('没有录音文件', 'error');
        return;
      }
      
      const title = document.getElementById('titleInput').value.trim() || 
                   `录音_${new Date().toLocaleString('zh-CN')}`;
      
      // 显示加载状态
      document.getElementById('loadingSection').classList.add('show');
      
      // 创建FormData
      const formData = new FormData();
      formData.append('file', recordedBlob, 'recording.webm');
      formData.append('title', title);
      
      // 上传并转录
      fetch('/api/audio_transcription/upload', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${currentToken}`
        },
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('loadingSection').classList.remove('show');
        
        if (data.success) {
          showToast('录音上传成功，正在转录...', 'success');
          // 添加到处理中的转录列表
          processingTranscriptions.add(data.transcription_id);
          resetRecording();
          loadTranscriptions();
        } else {
          showToast(data.error || '上传失败，请重试', 'error');
        }
      })
      .catch(error => {
        document.getElementById('loadingSection').classList.remove('show');
        console.error('Upload error:', error);
        showToast('上传失败，请检查网络连接', 'error');
      });
    }
    
    // 更新录音UI状态
    function updateRecordingUI(state) {
      const section = document.getElementById('recordingSection');
      const icon = document.getElementById('recordingIcon');
      const text = document.getElementById('recordingText');
      const startBtn = document.getElementById('startRecordBtn');
      const stopBtn = document.getElementById('stopRecordBtn');
      const reRecordBtn = document.getElementById('reRecordBtn');
      const uploadBtn = document.getElementById('uploadRecordBtn');
      const status = document.getElementById('recordingStatus');
      const statusText = document.getElementById('statusText');
      
      switch (state) {
        case 'recording':
          section.classList.add('recording');
          text.textContent = '正在录音...';
          startBtn.style.display = 'none';
          stopBtn.style.display = 'inline-flex';
          reRecordBtn.style.display = 'none';
          uploadBtn.style.display = 'none';
          status.style.display = 'flex';
          statusText.textContent = '录音中...';
          break;
          
        case 'stopped':
          section.classList.remove('recording');
          text.textContent = '录音完成';
          startBtn.style.display = 'none';
          stopBtn.style.display = 'none';
          reRecordBtn.style.display = 'inline-flex';
          uploadBtn.style.display = 'inline-flex';
          status.style.display = 'none';
          break;
          
        case 'ready':
        default:
          section.classList.remove('recording');
          text.textContent = '点击开始录音';
          startBtn.style.display = 'inline-flex';
          stopBtn.style.display = 'none';
          reRecordBtn.style.display = 'none';
          uploadBtn.style.display = 'none';
          status.style.display = 'none';
          break;
      }
    }
    
    // 开始计时器
    function startTimer() {
      const timeDisplay = document.getElementById('recordingTime');
      recordingTimer = setInterval(() => {
        const elapsed = Date.now() - recordingStartTime;
        const minutes = Math.floor(elapsed / 60000);
        const seconds = Math.floor((elapsed % 60000) / 1000);
        timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }
    
    // 停止计时器
    function stopTimer() {
      if (recordingTimer) {
        clearInterval(recordingTimer);
        recordingTimer = null;
      }
    }
    
    // 开始音频可视化
    function startVisualizer(stream) {
      const canvas = document.getElementById('visualizerCanvas');
      const canvasCtx = canvas.getContext('2d');
      const visualizer = document.getElementById('audioVisualizer');
      
      visualizer.style.display = 'block';
      
      // 设置音频上下文
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      microphone = audioContext.createMediaStreamSource(stream);
      
      analyser.fftSize = 256;
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      
      microphone.connect(analyser);
      
      // 绘制波形
      function draw() {
        visualizerAnimationId = requestAnimationFrame(draw);
        
        analyser.getByteFrequencyData(dataArray);
        
        canvasCtx.fillStyle = '#f8fafc';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        const barWidth = (canvas.width / bufferLength) * 2.5;
        let barHeight;
        let x = 0;
        
        for (let i = 0; i < bufferLength; i++) {
          barHeight = (dataArray[i] / 255) * canvas.height * 0.8;
          
          const gradient = canvasCtx.createLinearGradient(0, canvas.height - barHeight, 0, canvas.height);
          gradient.addColorStop(0, '#4f46e5');
          gradient.addColorStop(1, '#7c3aed');
          
          canvasCtx.fillStyle = gradient;
          canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
          
          x += barWidth + 1;
        }
      }
      
      draw();
    }
    
    // 停止音频可视化
    function stopVisualizer() {
      if (visualizerAnimationId) {
        cancelAnimationFrame(visualizerAnimationId);
        visualizerAnimationId = null;
      }
      
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      
      document.getElementById('audioVisualizer').style.display = 'none';
    }
    
    // 显示音频预览
    function showAudioPreview(blob) {
      const preview = document.getElementById('audioPreview');
      const audio = document.getElementById('previewAudio');
      const duration = document.getElementById('previewDuration');
      const size = document.getElementById('previewSize');
      
      const url = URL.createObjectURL(blob);
      audio.src = url;
      
      audio.onloadedmetadata = function() {
        const mins = Math.floor(audio.duration / 60);
        const secs = Math.floor(audio.duration % 60);
        duration.textContent = `时长: ${mins}:${secs.toString().padStart(2, '0')}`;
      };
      
      size.textContent = `大小: ${(blob.size / 1024).toFixed(1)} KB`;
      preview.style.display = 'block';
    }
    
    // 隐藏音频预览
    function hideAudioPreview() {
      const preview = document.getElementById('audioPreview');
      const audio = document.getElementById('previewAudio');
      
      if (audio.src) {
        URL.revokeObjectURL(audio.src);
        audio.src = '';
      }
      
      preview.style.display = 'none';
    }
    
    // 模式切换
    function switchMode(mode) {
      currentMode = mode;
      const recordBtn = document.getElementById('recordModeBtn');
      const uploadBtn = document.getElementById('uploadModeBtn');
      const recordSection = document.getElementById('recordingSection');
      const uploadSection = document.getElementById('uploadSection');
      
      if (mode === 'record') {
        recordBtn.classList.add('active');
        uploadBtn.classList.remove('active');
        recordSection.style.display = 'block';
        uploadSection.style.display = 'none';
        
        // 清理上传状态
        clearSelectedFile();
      } else {
        recordBtn.classList.remove('active');
        uploadBtn.classList.add('active');
        recordSection.style.display = 'none';
        uploadSection.style.display = 'block';
        
        // 清理录音状态
        resetRecording();
      }
    }
    
    // 初始化上传功能
    function initializeUpload() {
      const uploadSection = document.getElementById('uploadSection');
      const fileInput = document.getElementById('fileInput');
      
      // 拖拽上传
      uploadSection.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadSection.classList.add('dragover');
      });
      
      uploadSection.addEventListener('dragleave', function(e) {
        e.preventDefault();
        uploadSection.classList.remove('dragover');
      });
      
      uploadSection.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadSection.classList.remove('dragover');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFileSelection(files[0]);
        }
      });
      
      // 文件选择上传
      fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
          handleFileSelection(e.target.files[0]);
        }
      });
    }
    
    // 处理文件选择
    function handleFileSelection(file) {
      // 验证文件类型
      const allowedTypes = ['audio/mpeg', 'audio/wav', 'audio/mp4', 'audio/m4a', 'audio/flac', 'audio/ogg', 'audio/webm'];
      const allowedExtensions = ['.mp3', '.wav', '.m4a', '.flac', '.ogg', '.mp4', '.webm'];
      
      const isValidType = allowedTypes.includes(file.type) || 
                         allowedExtensions.some(ext => file.name.toLowerCase().endsWith(ext));
      
      if (!isValidType) {
        showToast('请选择有效的音频文件格式', 'error');
        return;
      }
      
      // 验证文件大小 (25MB)
      if (file.size > 25 * 1024 * 1024) {
        showToast('文件大小不能超过 25MB', 'error');
        return;
      }
      
      selectedFile = file;
      showFilePreview(file);
      
      // 自动填充标题
      const titleInput = document.getElementById('uploadTitleInput');
      if (!titleInput.value.trim()) {
        titleInput.value = file.name.replace(/\.[^/.]+$/, "");
      }
    }
    
    // 显示文件预览
    function showFilePreview(file) {
      const preview = document.getElementById('filePreview');
      const fileName = document.getElementById('fileName');
      const fileSize = document.getElementById('fileSize');
      const fileType = document.getElementById('fileType');
      
      fileName.textContent = file.name;
      fileSize.textContent = `大小: ${(file.size / 1024 / 1024).toFixed(2)} MB`;
      fileType.textContent = `类型: ${file.type || '未知'}`;
      
      preview.style.display = 'block';
    }
    
    // 清除选中的文件
    function clearSelectedFile() {
      selectedFile = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('uploadTitleInput').value = '';
      document.getElementById('filePreview').style.display = 'none';
    }
    
    // 上传选中的文件
    function uploadSelectedFile() {
      if (!selectedFile) {
        showToast('请先选择音频文件', 'error');
        return;
      }
      
      const title = document.getElementById('uploadTitleInput').value.trim() || 
                   selectedFile.name.replace(/\.[^/.]+$/, "");
      
      // 显示加载状态
      document.getElementById('loadingSection').classList.add('show');
      
      // 创建FormData
      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('title', title);
      
      // 上传并转录
      fetch('/api/audio_transcription/upload', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${currentToken}`
        },
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('loadingSection').classList.remove('show');
        
        if (data.success) {
          showToast('音频上传成功，正在转录...', 'success');
          // 添加到处理中的转录列表
          processingTranscriptions.add(data.transcription_id);
          clearSelectedFile();
          loadTranscriptions();
        } else {
          showToast(data.error || '上传失败，请重试', 'error');
        }
      })
      .catch(error => {
        document.getElementById('loadingSection').classList.remove('show');
        console.error('Upload error:', error);
        showToast('上传失败，请检查网络连接', 'error');
      });
    }
    
    // 加载转录列表
    function loadTranscriptions() {
      if (!currentToken) {
        console.log('No valid token, skipping transcriptions load');
        renderTranscriptions([]);
        return;
      }
      
      fetch('/api/audio_transcription/list', {
        headers: {
          'Authorization': `Bearer ${currentToken}`
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          // 检查处理中的转录是否完成
          checkProcessingStatus(data.transcriptions);
          renderTranscriptions(data.transcriptions);
        } else {
          console.error('Failed to load transcriptions:', data.error);
          if (data.error.includes('token') || data.error.includes('登录')) {
            // Token无效，重定向到登录页面
            showToast('登录已过期，请重新登录', 'error');
            setTimeout(() => {
              window.location.href = '/login';
            }, 2000);
          } else {
            renderTranscriptions([]);
          }
        }
      })
      .catch(error => {
        console.error('Load transcriptions error:', error);
        renderTranscriptions([]);
      });
    }
    
    // 检查处理中的转录状态
    function checkProcessingStatus(transcriptions) {
      const completedIds = [];
      
      for (const transcription of transcriptions) {
        if (processingTranscriptions.has(transcription.id)) {
          if (transcription.status === 'completed') {
            completedIds.push(transcription.id);
            showToast(`"${transcription.title}" 转录完成！`, 'success');
          } else if (transcription.status === 'error') {
            completedIds.push(transcription.id);
            showToast(`"${transcription.title}" 转录失败`, 'error');
          }
        }
      }
      
      // 从处理中列表移除已完成的
      completedIds.forEach(id => processingTranscriptions.delete(id));
    }
    
    // 开始轮询
    function startPolling() {
      // 每3秒轮询一次
      pollingInterval = setInterval(() => {
        // 只在页面可见且有处理中的转录时轮询
        if (processingTranscriptions.size > 0 && !document.hidden) {
          loadTranscriptions();
        }
      }, 3000);
      
      // 页面可见性变化时的处理
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && processingTranscriptions.size > 0) {
          // 页面变为可见时立即检查一次
          loadTranscriptions();
        }
      });
    }
    
    // 停止轮询
    function stopPolling() {
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }
    
    // 渲染转录列表
    function renderTranscriptions(transcriptions) {
      const container = document.getElementById('transcriptionsList');
      
      if (transcriptions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎵</div>
            <h3>还没有转录记录</h3>
            <p>上传您的第一个音频文件开始使用吧！</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = transcriptions.map(item => `
        <div class="transcription-item" data-id="${item.id}">
          <div class="transcription-header">
            <div class="transcription-title">${item.title}</div>
            <div class="transcription-date">${formatDate(item.created_at)}</div>
            <div class="transcription-status status-${item.status}">
              ${getStatusText(item.status)}
            </div>
          </div>
          
          ${item.text ? `
            <div class="transcription-text">${escapeHtml(item.text)}</div>
          ` : (item.status === 'processing' ? `
            <div class="transcription-text processing-status">
              <span class="status-icon">⏳</span>
              正在转录中，请稍候...
            </div>
          ` : (item.status === 'error' ? `
            <div class="transcription-text error-status">
              <span class="status-icon">❌</span>
              <div class="error-content">
                <div class="error-title">转录失败</div>
                <div class="error-detail">${formatErrorMessage(item.error || '未知错误')}</div>
                <div class="error-hint">点击"重新转录"按钮重试</div>
              </div>
            </div>
          ` : ''))}
          
          <div class="transcription-actions">
            ${item.audio_url ? `
              <a href="${item.audio_url}" class="action-btn btn-secondary" download>
                <span>⬇️</span> 下载音频
              </a>
            ` : ''}
            
            ${item.text ? `
              <button class="action-btn btn-primary" onclick="copyText('${item.id}')">
                <span>📋</span> 复制文本
              </button>
            ` : ''}
            
            <button class="action-btn btn-secondary" onclick="retranscribe('${item.id}')" 
                    ${item.status === 'processing' ? 'disabled' : ''}>
              <span>🔄</span> 重新转录
            </button>
            
            <button class="action-btn btn-danger" onclick="deleteTranscription('${item.id}')">
              <span>🗑️</span> 删除
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // 复制文本
    function copyText(id) {
      const transcriptionItem = document.querySelector(`[data-id="${id}"] .transcription-text`);
      if (transcriptionItem) {
        navigator.clipboard.writeText(transcriptionItem.textContent).then(() => {
          showToast('文本已复制到剪贴板', 'success');
        }).catch(() => {
          // 降级方案：创建临时文本区域
          const textArea = document.createElement('textarea');
          textArea.value = transcriptionItem.textContent;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          showToast('文本已复制到剪贴板', 'success');
        });
      }
    }
    
    // 重新转录
    function retranscribe(id) {
      // 找到对应的转录记录以获取标题
      const transcriptionItem = document.querySelector(`[data-id="${id}"]`);
      const title = transcriptionItem ? transcriptionItem.querySelector('.transcription-title').textContent : '该音频';
      
      if (!confirm(`确定要重新转录"${title}"吗？\n\n这将使用原始音频文件重新进行转录。`)) return;
      
      // 禁用重新转录按钮，防止重复点击
      const retryBtn = transcriptionItem ? transcriptionItem.querySelector('button[onclick*="retranscribe"]') : null;
      if (retryBtn) {
        retryBtn.disabled = true;
        retryBtn.innerHTML = '<span>⏳</span> 转录中...';
      }
      
      fetch(`/api/audio_transcription/retranscribe/${id}`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${currentToken}`
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          showToast(`"${title}" 重新转录已开始`, 'success');
          // 添加到处理中的转录列表
          processingTranscriptions.add(id);
          loadTranscriptions();
        } else {
          showToast(data.error || '重新转录失败', 'error');
          // 恢复按钮状态
          if (retryBtn) {
            retryBtn.disabled = false;
            retryBtn.innerHTML = '<span>🔄</span> 重新转录';
          }
        }
      })
      .catch(error => {
        console.error('Retranscribe error:', error);
        showToast('网络错误，请检查连接后重试', 'error');
        // 恢复按钮状态
        if (retryBtn) {
          retryBtn.disabled = false;
          retryBtn.innerHTML = '<span>🔄</span> 重新转录';
        }
      });
    }
    
    // HTML转义函数
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 格式化错误消息
    function formatErrorMessage(error) {
      if (typeof error !== 'string') {
        return '未知错误';
      }
      
      // 网络连接错误
      if (error.includes('Network is unreachable') || error.includes('Connection') || error.includes('HTTPSConnectionPool')) {
        return '网络连接失败，请检查网络连接后重试';
      }
      
      // API错误
      if (error.includes('API') || error.includes('api')) {
        return 'API服务暂时不可用，请稍后重试';
      }
      
      // 超时错误
      if (error.includes('timeout') || error.includes('Timeout')) {
        return '请求超时，请重试';
      }
      
      // 文件格式错误
      if (error.includes('format') || error.includes('格式')) {
        return '音频格式不支持，请使用其他格式';
      }
      
      // 其他错误，截取前100个字符
      return error.length > 100 ? error.substring(0, 100) + '...' : error;
    }
    
    // 删除转录
    function deleteTranscription(id) {
      if (!confirm('确定要删除这个转录记录吗？此操作不可恢复。')) return;
      
      fetch(`/api/audio_transcription/delete/${id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': `Bearer ${currentToken}`
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          showToast('转录记录已删除', 'success');
          loadTranscriptions();
        } else {
          showToast(data.error || '删除失败', 'error');
        }
      })
      .catch(error => {
        console.error('Delete error:', error);
        showToast('删除失败，请重试', 'error');
      });
    }
    
    // 显示Toast通知
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      
      toastMessage.textContent = message;
      toast.className = `toast ${type}`;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    // 格式化日期
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    // 获取状态文本
    function getStatusText(status) {
      const statusMap = {
        'processing': '转录中',
        'completed': '已完成',
        'error': '转录失败'
      };
      return statusMap[status] || status;
    }
  </script>
</body>
</html>
