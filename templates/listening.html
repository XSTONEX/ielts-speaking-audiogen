<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
    (function () {
      try {
        var preference = localStorage.getItem('ui-theme');
        if (preference !== 'light' && preference !== 'dark' && preference !== 'system') preference = 'system';
        var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = preference === 'system' ? (isDark ? 'dark' : 'light') : preference;
        var root = document.documentElement;
        root.dataset.themePreference = preference;
        root.dataset.theme = theme;
        root.style.colorScheme = theme;
        root.classList.toggle('dark', theme === 'dark');
      } catch (error) {
        document.documentElement.dataset.themePreference = 'system';
        document.documentElement.dataset.theme = 'light';
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <title>Listening Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['PT Serif', 'Crimson Text', 'ui-serif', 'Georgia', 'Cambria', '"Times New Roman"', 'Times', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PT Serif', 'Crimson Text', ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif; }

    /* Lyrics dynamic states */
    .lyrics-line .line-text { color: #64748b; transition: color .3s, font-weight .3s; }
    .lyrics-line.active { background: rgba(239,246,255,.85); border-left: 3px solid #3b82f6; }
    .lyrics-line.active .line-text { color: #0f172a; font-weight: 600; }
    .lyrics-line.starred:not(.active) { background: linear-gradient(90deg, #fef9c3, transparent 60%); }
    .lyrics-line.active.starred { background: linear-gradient(90deg, #fef9c3 0%, rgba(239,246,255,.85) 40%); border-left: 3px solid #3b82f6; }

    /* Annotated word */
    .annotated-word { position: relative; background: rgba(191,219,254,.45); text-decoration: underline solid #60a5fa; text-decoration-thickness: 1.5px; text-underline-offset: 2px; cursor: help; border-radius: 3px; padding: 1px 2px; transition: background .15s; }
    .annotated-word:hover { background: rgba(147,197,253,.6); }
    .annotated-word::after { content: attr(data-meaning); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; font-size: 12px; line-height: 1.4; padding: 5px 10px; border-radius: 6px; max-width: 200px; width: max-content; text-align: center; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 150; font-weight: normal; text-decoration: none; white-space: pre-wrap; }
    .annotated-word::before { content: ''; position: absolute; bottom: calc(100% + 2px); left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #1e293b; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 150; }
    .annotated-word:hover::after, .annotated-word:hover::before { opacity: 1; }

    /* Note highlight — full-word amber highlighter */
    .note-mark { background-color: rgba(251,191,36,.42); border-radius: 3px; cursor: pointer; padding: 1px 2px; box-decoration-break: clone; -webkit-box-decoration-break: clone; transition: background-color .15s; }
    .note-mark:hover { background-color: rgba(245,158,11,.55); }
    /* When a span is both a note and a vocab annotation, keep the amber highlight + blue underline */
    .note-mark.annotated-word { background-color: rgba(251,191,36,.42); }

    /* Context highlight inside the annotated "notes article" (no tooltip) */
    .ctx-mark { border-radius: 3px; padding: 1px 2px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
    .ctx-mark.note  { background-color: rgba(251,191,36,.5); }
    .ctx-mark.vocab { background-color: rgba(191,219,254,.75); text-decoration: underline solid #60a5fa; text-decoration-thickness: 1.5px; text-underline-offset: 2px; }

    /* Progress bar hover */
    .progress-wrap:hover .progress-thumb { transform: translate(-50%,-50%) scale(1.5); }
    .progress-wrap:hover .progress-track-inner { height: 6px; }

    /* Toast animation */
    .toast-show { transform: translateX(-50%) translateY(0) !important; opacity: 1 !important; }

    /* Translation line */
    .translation-line { font-size: 14px; color: #64748b; opacity: 0.7; line-height: 1.5; margin-top: 2px; }
    .lyrics-line.active .translation-line { opacity: 0.85; }
    .translations-hidden .translation-line { display: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
  <link rel="stylesheet" href="/static/theme.css">
  <script src="/static/theme.js" defer></script>
  <script src="/static/api-client.js" defer></script>
  <script src="/static/auth.js" defer></script>
  <script src="/static/ui-feedback.js" defer></script>
  <script src="/static/app-shell.js" defer></script>
</head>

<script>
// ===================================================================
//  State
// ===================================================================
const state = {
  view: 'list',
  projects: [],
  currentProject: null,
  currentData: null,
  activeSegmentId: -1,
  playbackRate: 1.0,
  pollingTimer: null,
  showTranslations: true,
  pendingVocab: null,    // { segmentId, word, startOffset, endOffset } — pending text selection
  viewingAnnot: null,     // { id, segmentId } — for vocab delete mode
  notePending: null,      // { segmentId, word, startOffset, endOffset } — selection awaiting a new note
  viewingNote: null,      // the note object currently shown in the popover
  editingNote: null,      // the note object currently being edited
  notesFilter: 'all',
  vocabAudioPauseActive: false,
  vocabAudioWasPlaying: false,
  vocabAudioManualOverride: false
};

const audioEl = document.getElementById('audioEl');

function beginVocabAudioPause() {
  if (state.vocabAudioPauseActive) {
    if (!state.vocabAudioManualOverride && !audioEl.paused) audioEl.pause();
    return;
  }

  state.vocabAudioWasPlaying = !audioEl.paused;
  state.vocabAudioPauseActive = true;
  state.vocabAudioManualOverride = false;

  if (!audioEl.paused) audioEl.pause();
}

function markVocabAudioManualOverride() {
  if (state.vocabAudioPauseActive) state.vocabAudioManualOverride = true;
}

function endVocabAudioPause() {
  const shouldResume = state.vocabAudioPauseActive && state.vocabAudioWasPlaying && !state.vocabAudioManualOverride;

  state.vocabAudioPauseActive = false;
  state.vocabAudioWasPlaying = false;
  state.vocabAudioManualOverride = false;

  if (shouldResume && audioEl.paused) audioEl.play().catch(() => {});
}

// ===================================================================
//  API Helper
// ===================================================================
const API = {
  _headers(json) {
    const h = {};
    const tk = localStorage.getItem('authToken');
    if (tk) h['Authorization'] = 'Bearer ' + tk;
    if (json) h['Content-Type'] = 'application/json';
    return h;
  },
  async get(url)          { return (await fetch(url, { headers: this._headers() })).json(); },
  async post(url, body)   { return (await fetch(url, { method: 'POST',   headers: this._headers(true), body: JSON.stringify(body) })).json(); },
  async put(url, body)    { return (await fetch(url, { method: 'PUT',    headers: this._headers(true), body: JSON.stringify(body) })).json(); },
  async del(url)          { return (await fetch(url, { method: 'DELETE', headers: this._headers() })).json(); },
  async upload(url, fd)   {
    const h = {};
    const tk = localStorage.getItem('authToken');
    if (tk) h['Authorization'] = 'Bearer ' + tk;
    return (await fetch(url, { method: 'POST', headers: h, body: fd })).json();
  }
};

// ===================================================================
//  Init
// ===================================================================
(async function init() {
  const tk = localStorage.getItem('authToken');
  if (!tk) { location.href = '/login'; return; }
  try {
    const r = await fetch('/verify_token', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: tk }) });
    const d = await r.json();
    if (!d.valid) { localStorage.removeItem('authToken'); location.href = '/login'; return; }
  } catch { location.href = '/login'; return; }
  await loadProjects();
  await maybeDeepLinkFromUrl();
})();

// Deep-link support: /listening_review?project=<id>&seg=<segId> opens a project and jumps to a segment.
async function maybeDeepLinkFromUrl() {
  const params = new URLSearchParams(location.search);
  const pid = params.get('project');
  if (!pid) return;
  history.replaceState(null, '', '/listening_review'); // avoid re-triggering on refresh
  await openProject(pid);
  if (state.view !== 'detail') return; // openProject bailed (still processing / error)
  const segParam = params.get('seg');
  if (segParam === null) return;
  const segId = parseInt(segParam);
  const seg = state.currentData?.segments.find(s => s.id === segId);
  if (!seg) return;
  state.activeSegmentId = segId;
  highlightSegment(segId);
  const applySeek = () => { audioEl.currentTime = seg.start; };
  if (audioEl.readyState >= 1) applySeek();
  else audioEl.addEventListener('loadedmetadata', applySeek, { once: true });
}

function switchView(view) {
  state.view = view;
  const listView    = document.getElementById('listView');
  const detailView  = document.getElementById('detailView');
  const playerBar   = document.getElementById('playerBar');
  const topList     = document.getElementById('topList');
  const topDetail   = document.getElementById('topDetail');

  if (view === 'list') {
    listView.classList.remove('hidden');
    detailView.classList.add('hidden');
    playerBar.classList.add('hidden');
    topList.classList.remove('hidden');    topList.style.display = 'flex';
    topDetail.classList.add('hidden');     topDetail.style.display = 'none';
  } else {
    listView.classList.add('hidden');
    detailView.classList.remove('hidden');
    playerBar.classList.remove('hidden');
    topList.classList.add('hidden');       topList.style.display = 'none';
    topDetail.classList.remove('hidden');  topDetail.style.display = 'flex';
  }
}

//  List View
// ===================================================================
async function loadProjects() {
  const r = await API.get('/api/listening_review/list');
  if (r.error) { showToast(r.error); return; }
  state.projects = r.projects || [];
  renderListView();

  const hasInProgress = state.projects.some(p => p.status === 'processing' || p.status === 'translating');
  if (hasInProgress && !state.pollingTimer) {
    state.pollingTimer = setInterval(async () => {
      if (state.view !== 'list') return;
      const r2 = await API.get('/api/listening_review/list');
      if (r2.projects) {
        state.projects = r2.projects;
        renderListView();
        if (!r2.projects.some(p => p.status === 'processing' || p.status === 'translating')) {
          clearInterval(state.pollingTimer);
          state.pollingTimer = null;
        }
      }
    }, 3000);
  } else if (!hasInProgress && state.pollingTimer) {
    clearInterval(state.pollingTimer);
    state.pollingTimer = null;
  }
}

function renderListView() {
  const grid = document.getElementById('projectGrid');
  if (state.projects.length === 0) {
    grid.innerHTML = `
      <div class="col-span-full text-center py-16 text-slate-400">
        <div class="text-5xl mb-3">&#127911;</div>
        <div>No listening projects yet.<br>Click "+ New Project" to get started.</div>
      </div>`;
    return;
  }
  grid.innerHTML = state.projects.map(p => {
    const statusCls = { completed: 'bg-emerald-50 text-emerald-600', processing: 'bg-amber-50 text-amber-600', translating: 'bg-purple-50 text-purple-600', error: 'bg-red-50 text-red-600' }[p.status] || '';
    const statusText = { completed: 'Completed', processing: 'Processing...', translating: 'Translating...', error: 'Error' }[p.status] || p.status;
    const dur = p.duration ? formatTime(p.duration) : '--:--';
    const date = p.created_at ? new Date(p.created_at).toLocaleDateString('zh-CN') : '';
    const isMastered = !!p.mastered;
    const checkinCount = p.checkin_count || 0;
    const vocabCount = p.vocab_count || 0;
    const noteCount = p.note_count || 0;
    const cardBorder = isMastered ? 'border-slate-100 opacity-60' : 'border-slate-200';
    const retryBtn = p.status === 'error'
      ? `<button class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-md mt-2 ml-1.5 bg-blue-50 text-blue-600 border-none cursor-pointer hover:bg-blue-100 transition-colors" onclick="event.stopPropagation();retryProject('${p.id}')">&#8635; Retry</button>`
      : '';
    const masteredBadge = isMastered ? '<span class="inline-block text-[11px] font-semibold px-2 py-0.5 rounded-md mt-2 ml-1.5 bg-emerald-50 text-emerald-500">&#10003; 已掌握</span>' : '';
    return `
      <div class="group relative bg-white border ${cardBorder} rounded-xl p-5 cursor-pointer transition-all hover:-translate-y-0.5 hover:shadow-lg hover:border-blue-200" onclick="openProject('${p.id}')">
        <button class="absolute top-2.5 right-2.5 w-7 h-7 flex items-center justify-center bg-transparent border-none text-slate-300 hover:text-red-500 hover:bg-red-50 cursor-pointer text-lg rounded transition-colors" onclick="event.stopPropagation();deleteProject('${p.id}')" title="Delete">&times;</button>
        <div class="font-bold text-slate-800 text-[15px] mb-1.5 pr-6 break-words">${esc(p.title)}</div>
        <div class="text-xs text-slate-400 flex items-center gap-3 flex-wrap">
          <span>${date}</span><span>${dur}</span>${checkinCount > 0 ? `<span class="text-amber-500" title="打卡次数">&#9998; ${checkinCount}</span>` : ''}${vocabCount > 0 ? `<span class="text-blue-400" title="标注单词数">&#9679; ${vocabCount} 词</span>` : ''}${noteCount > 0 ? `<span class="text-amber-500" title="笔记数">&#128221; ${noteCount}</span>` : ''}
        </div>
        <div class="flex items-center flex-wrap">
          <span class="inline-block text-[11px] font-semibold px-2 py-0.5 rounded-md mt-2 ${statusCls}">${statusText}</span>
          ${retryBtn}${masteredBadge}
        </div>
      </div>`;
  }).join('');
}

async function deleteProject(id) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  const r = await API.del('/api/listening_review/project/' + id);
  if (r.success) { showToast('Project deleted'); await loadProjects(); }
  else showToast(r.error || 'Delete failed');
}

async function retryProject(id) {
  const r = await API.post('/api/listening_review/project/' + id + '/retry', {});
  if (r.success) { showToast('重新转录已开始...'); await loadProjects(); }
  else showToast(r.error || 'Retry failed');
}

function openUploadModal() {
  document.getElementById('uploadModal').classList.remove('hidden');
  document.getElementById('fileTitle').value = '';
  document.getElementById('urlTitle').value = '';
  document.getElementById('urlInput').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('fileDropText').textContent = 'Click to select or drag audio file here';
  document.getElementById('uploadFileBtn').disabled = true;
  switchTab('file');
}

function closeUploadModal() { document.getElementById('uploadModal').classList.add('hidden'); }

function switchTab(tab) {
  const tabs = document.querySelectorAll('.modal-tab');
  const activeClasses  = ['text-blue-600', 'border-blue-500'];
  const inactiveClasses = ['text-slate-400', 'border-transparent'];
  const all = [...activeClasses, ...inactiveClasses];

  tabs.forEach((t, i) => {
    t.classList.remove(...all);
    const isActive = (i === 0 && tab === 'file') || (i === 1 && tab === 'url');
    t.classList.add(...(isActive ? activeClasses : inactiveClasses));
  });

  document.getElementById('tabFile').classList.toggle('hidden', tab !== 'file');
  document.getElementById('tabUrl').classList.toggle('hidden', tab !== 'url');
}

function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 25 * 1024 * 1024) { showToast('File exceeds 25MB limit'); input.value = ''; return; }
  document.getElementById('fileDropText').textContent = file.name;
  document.getElementById('uploadFileBtn').disabled = false;
}

async function doUploadFile() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;
  const btn = document.getElementById('uploadFileBtn');
  btn.disabled = true; btn.textContent = 'Uploading...';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('title', document.getElementById('fileTitle').value.trim());
  try {
    const r = await API.upload('/api/listening_review/upload', fd);
    if (r.success) { showToast('Upload successful, transcribing...'); closeUploadModal(); await loadProjects(); }
    else showToast(r.error || 'Upload failed');
  } catch (e) { showToast('Upload failed: ' + e.message); }
  btn.disabled = false; btn.textContent = 'Upload';
}

async function doUploadUrl() {
  const urlVal = document.getElementById('urlInput').value.trim();
  if (!urlVal) { showToast('Please enter a URL'); return; }
  const btn = document.getElementById('uploadUrlBtn');
  btn.disabled = true; btn.textContent = 'Downloading...';
  try {
    const r = await API.post('/api/listening_review/url', { url: urlVal, title: document.getElementById('urlTitle').value.trim() });
    if (r.success) { showToast('Download successful, transcribing...'); closeUploadModal(); await loadProjects(); }
    else showToast(r.error || 'Download failed');
  } catch (e) { showToast('Request failed: ' + e.message); }
  btn.disabled = false; btn.textContent = 'Download & Transcribe';
}

async function openProject(id) {
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  if (proj.status === 'processing') { showToast('Still transcribing, please wait...'); return; }
  if (proj.status === 'translating') { showToast('Translating, please wait...'); return; }
  if (proj.status === 'error') { showToast('Transcription failed: ' + (proj.error || 'Unknown error')); return; }

  const r = await API.get('/api/listening_review/project/' + id);
  if (r.error) { showToast(r.error); return; }

  state.currentProject = r.project;
  state.currentData = r.data;
  state.activeSegmentId = -1;

  switchView('detail');
  document.getElementById('detailTitle').textContent = r.project.title;
  updateMasteredBtn(!!r.project.mastered);
  updateCheckinBtn(r.project.checkin_count || 0);

  const tk = localStorage.getItem('authToken');
  audioEl.src = `/api/listening_review/audio/${id}/${r.project.audio_filename}?token=${encodeURIComponent(tk)}`;
  audioEl.load();
  renderLyrics();
  updateNotesButton();
}

function renderLyrics() {
  const container = document.getElementById('lyricsContainer');
  if (!state.currentData || !state.currentData.segments) {
    container.innerHTML = '<div class="text-center py-16 text-slate-400">No transcript data available.</div>';
    return;
  }

  const segs = state.currentData.segments;
  const starred = state.currentData.starred_segments || [];
  const annots = state.currentData.vocab_annotations || [];
  const notes = state.currentData.notes || [];

  container.innerHTML = segs.map(seg => {
    const isActive = seg.id === state.activeSegmentId;
    const isStarred = starred.includes(seg.id);
    const segAnnots = annots.filter(a => a.segment_id === seg.id);
    const segNotes = notes.filter(n => n.segment_id === seg.id);
    const textHtml = renderAnnotatedText(seg.text, segAnnots, segNotes);

    let cls = 'lyrics-line group flex items-start gap-2 px-5 md:px-8 py-3 cursor-pointer rounded-r-lg transition-all duration-300';
    if (isActive)  cls += ' active';
    if (isStarred) cls += ' starred';

    const translationHtml = seg.translation ? `<div class="translation-line">${esc(seg.translation)}</div>` : '';

    return `
      <div class="${cls}" data-seg-id="${seg.id}" data-start="${seg.start}" data-end="${seg.end}">
        <span class="w-14 flex-shrink-0 text-slate-400 font-mono text-xs pt-0.5 text-right select-none">${formatTime(seg.start)}</span>
        <button class="star-btn flex-shrink-0 bg-transparent border-none cursor-pointer text-base p-0 leading-none mt-0.5 transition-all ${isStarred ? 'text-amber-400 opacity-100' : 'text-slate-300 opacity-0 group-hover:opacity-100 hover:text-amber-400'}" data-seg-id="${seg.id}">${isStarred ? '\u2605' : '\u2606'}</button>
        <div class="flex-1">
          <span class="line-text text-[15px] leading-relaxed select-text cursor-text" data-seg-id="${seg.id}">${textHtml}</span>
          ${translationHtml}
        </div>
      </div>`;
  }).join('');
}

// Render a segment's text with overlap-safe vocab underlines + note highlights.
// Both annotation types can coexist on the same characters; we split the text at
// every annotation boundary so the markup never breaks, even when ranges overlap.
function renderAnnotatedText(text, vocabAnnots, noteAnnots) {
  const ranges = [];
  (vocabAnnots || []).forEach(a => ranges.push({ start: a.start_offset, end: a.end_offset, type: 'vocab', id: a.id, meaning: a.meaning, segId: a.segment_id }));
  (noteAnnots  || []).forEach(n => ranges.push({ start: n.start_offset, end: n.end_offset, type: 'note',  id: n.id }));
  if (ranges.length === 0) return esc(text);

  const bounds = new Set([0, text.length]);
  ranges.forEach(r => {
    if (r.start >= 0 && r.start <= text.length) bounds.add(r.start);
    if (r.end   >= 0 && r.end   <= text.length) bounds.add(r.end);
  });
  const points = [...bounds].sort((a, b) => a - b);

  let html = '';
  for (let i = 0; i < points.length - 1; i++) {
    const b0 = points[i], b1 = points[i + 1];
    if (b1 <= b0) continue;
    const slice = text.substring(b0, b1);
    const covering = ranges.filter(r => r.start <= b0 && r.end >= b1);
    if (covering.length === 0) { html += esc(slice); continue; }

    const vocab = covering.find(r => r.type === 'vocab');
    const note  = covering.find(r => r.type === 'note');
    const cls = [];
    let attrs = '';
    if (vocab) { cls.push('annotated-word'); attrs += ` data-aid="${vocab.id}" data-seg-id="${vocab.segId}" data-meaning="${esc(vocab.meaning)}"`; }
    if (note)  { cls.push('note-mark');      attrs += ` data-note-id="${note.id}"`; }
    html += `<span class="${cls.join(' ')}"${attrs}>${esc(slice)}</span>`;
  }
  return html;
}

// ===================================================================
//  Lyrics Event Delegation (click, mouseup)
// ===================================================================
const lyricsContainer = document.getElementById('lyricsContainer');

// Click: seek / star / view annotation
lyricsContainer.addEventListener('click', (e) => {
  // Star button
  const starBtn = e.target.closest('.star-btn');
  if (starBtn) {
    e.stopPropagation();
    toggleStar(parseInt(starBtn.dataset.segId));
    return;
  }

  // Note highlight → view note (checked first so it wins over vocab on overlap)
  const noteEl = e.target.closest('.note-mark');
  if (noteEl) {
    e.stopPropagation();
    const sel = window.getSelection();
    if (sel && !sel.isCollapsed && sel.toString().trim()) return; // user was selecting
    openNoteView(noteEl);
    return;
  }

  // Annotated word → view mode (only if not selecting text)
  const annotEl = e.target.closest('.annotated-word');
  if (annotEl) {
    e.stopPropagation();
    const sel = window.getSelection();
    if (sel && !sel.isCollapsed && sel.toString().trim()) return; // user was selecting
    beginVocabAudioPause();
    showViewPopover(annotEl);
    return;
  }

  // Don't seek if user was selecting text
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed && sel.toString().trim()) return;

  // Seek to segment
  const line = e.target.closest('.lyrics-line');
  if (line) seekToSegment(parseInt(line.dataset.segId));
});

// Mouseup on line-text → show selection badge (non-intrusive, doesn't steal focus)
lyricsContainer.addEventListener('mouseup', (e) => {
  const lineText = e.target.closest('.line-text');
  if (!lineText) return;

  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) return;

  const segId = parseInt(lineText.dataset.segId);
  const seg = state.currentData?.segments.find(s => s.id === segId);
  if (!seg) return;

  const range = sel.getRangeAt(0);
  if (!lineText.contains(range.startContainer) || !lineText.contains(range.endContainer)) return;

  const rawText = sel.toString();
  const trimmed = rawText.trim();
  // Allow selecting a single word up to a full sentence within one segment.
  if (!trimmed || trimmed.length > 600) return;

  // Calculate plain-text offset by walking text nodes
  const rawStart = getTextOffset(lineText, range.startContainer, range.startOffset);
  if (rawStart === -1) return;

  const leadingSpaces = rawText.indexOf(trimmed);
  const startOffset = rawStart + leadingSpaces;
  const endOffset = startOffset + trimmed.length;

  if (seg.text.substring(startOffset, endOffset) !== trimmed) {
    const fb = seg.text.indexOf(trimmed);
    if (fb === -1) return;
    state.pendingVocab = { segmentId: segId, word: trimmed, startOffset: fb, endOffset: fb + trimmed.length };
  } else {
    state.pendingVocab = { segmentId: segId, word: trimmed, startOffset, endOffset };
  }

  beginVocabAudioPause();
  showSelectionToolbar(range.getBoundingClientRect());
});

/** Walk text nodes inside `root` and return the plain-text offset of `(node, offset)`. */
function getTextOffset(root, node, offset) {
  let pos = 0;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  let cur;
  while ((cur = walker.nextNode())) {
    if (cur === node) return pos + offset;
    pos += cur.textContent.length;
  }
  return -1;
}

//  Selection Badge & Vocab Popover

// --- Toolbar: "+释义 / +笔记" pill shown on text selection ---
function showSelectionToolbar(rect) {
  hideSelectionToolbar({ resumeAudio: false }); // clear any previous toolbar
  const tb = document.getElementById('selectionToolbar');
  tb.classList.remove('hidden');
  // Centre the (variable-width) pill above the selection.
  const cx = rect.left + window.scrollX + rect.width / 2;
  const w = tb.offsetWidth;
  let left = cx - w / 2;
  left = Math.max(6, Math.min(left, document.documentElement.clientWidth - w - 6));
  let top = rect.top + window.scrollY - tb.offsetHeight - 8;
  if (top < window.scrollY + 6) top = rect.bottom + window.scrollY + 8;
  tb.style.left = left + 'px';
  tb.style.top  = top  + 'px';
}

function hideSelectionToolbar({ resumeAudio = true } = {}) {
  document.getElementById('selectionToolbar').classList.add('hidden');
  if (resumeAudio) endVocabAudioPause();
}

// "+释义" → quick vocab meaning (existing flow)
document.getElementById('selVocabBtn').addEventListener('click', (e) => {

});

// "+笔记" → rich note on the selected word/sentence
document.getElementById('selNoteBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (!state.pendingVocab) return;
  const rect = document.getElementById('selectionToolbar').getBoundingClientRect();
  hideSelectionToolbar({ resumeAudio: false });
  openNoteAdd(state.pendingVocab, rect);
});

// --- Popover: full annotation form ---
function showAddPopover(word, rect) {
  beginVocabAudioPause();
  const pop = document.getElementById('vocabPopover');
  document.getElementById('vpWord').textContent = word;
  document.getElementById('vpInput').value = '';
  document.getElementById('vpAddMode').classList.remove('hidden');
  document.getElementById('vpViewMode').classList.add('hidden');
  state.viewingAnnot = null;

  pop.classList.remove('hidden');
  positionPopover(pop, rect);
  setTimeout(() => document.getElementById('vpInput').focus(), 30);
}

function showViewPopover(annotEl) {
  const aid = annotEl.dataset.aid;
  const segId = parseInt(annotEl.dataset.segId);
  const annot = state.currentData?.vocab_annotations.find(a => a.id === aid);
  if (!annot) return;

  beginVocabAudioPause();
  hideSelectionToolbar({ resumeAudio: false });
  const pop = document.getElementById('vocabPopover');
  document.getElementById('vpWord').textContent = annot.word;
  document.getElementById('vpMeaning').textContent = annot.meaning;
  document.getElementById('vpAddMode').classList.add('hidden');
  document.getElementById('vpViewMode').classList.remove('hidden');
  state.viewingAnnot = { id: aid, segmentId: segId };
  state.pendingVocab = null;

  pop.classList.remove('hidden');
  positionPopover(pop, annotEl.getBoundingClientRect());
}

function positionPopover(pop, rect) {
  pop.style.left = '-9999px';
  pop.style.top  = '-9999px';
  requestAnimationFrame(() => {
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    const cx = rect.left + window.scrollX + rect.width / 2;
    const cy = rect.top  + window.scrollY;
    let left = cx - pw / 2;
    let top  = cy - ph - 8;
    left = Math.max(8, Math.min(left, document.documentElement.scrollWidth - pw - 8));
    if (top < window.scrollY + 8) top = rect.bottom + window.scrollY + 8;
    pop.style.left = left + 'px';
    pop.style.top  = top  + 'px';
  });
}

function hideVocabPopover({ resumeAudio = true } = {}) {
  document.getElementById('vocabPopover').classList.add('hidden');
  state.pendingVocab = null;
  state.viewingAnnot = null;
  if (resumeAudio) endVocabAudioPause();
}

async function saveVocab() {
  const meaning = document.getElementById('vpInput').value.trim();
  if (!meaning || !state.pendingVocab) return;
  const pv = state.pendingVocab;
  const r = await API.put(`/api/listening_review/project/${state.currentProject.id}/vocab`, {
    segment_id: pv.segmentId, word: pv.word, meaning,
    start_offset: pv.startOffset, end_offset: pv.endOffset
  });
  if (r.success && r.data) {
    state.currentData = r.data;
    renderLyrics();
    refreshNotesView();
    updateNotesButton();
    showToast('标注已保存');
  }
  hideVocabPopover();
}

async function deleteVocab() {
  if (!state.viewingAnnot) return;
  const r = await API.del(`/api/listening_review/project/${state.currentProject.id}/vocab/${state.viewingAnnot.id}`);
  if (r.success && r.data) {
    state.currentData = r.data;
    renderLyrics();
    refreshNotesView();
    updateNotesButton();
    showToast('标注已删除');
  }
  hideVocabPopover();
}

document.getElementById('vpInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); saveVocab(); }
  if (e.key === 'Escape') hideVocabPopover();
});

// Dismiss toolbar / popovers on outside click
document.addEventListener('mousedown', (e) => {
  const vpop    = document.getElementById('vocabPopover');
  const npop    = document.getElementById('notePopover');
  const toolbar = document.getElementById('selectionToolbar');

  if (!vpop.classList.contains('hidden') && !vpop.contains(e.target)) {
    hideVocabPopover();
    return;
  }
  if (!npop.classList.contains('hidden') && !npop.contains(e.target)) {
    hideNotePopover();
    return;
  }
  if (!toolbar.classList.contains('hidden') && !toolbar.contains(e.target)) {
    hideSelectionToolbar();
    state.pendingVocab = null;
  }
});

// ===================================================================
//  Notes (rich note on a word / sentence)
// ===================================================================

// Open the editor for a brand-new note on the current selection.
function openNoteAdd(pending, rect) {
  beginVocabAudioPause();
  state.notePending = { ...pending };
  state.viewingNote = null;
  state.editingNote = null;

  const pop = document.getElementById('notePopover');
  document.getElementById('npQuote').textContent = pending.word;
  document.getElementById('npInput').value = '';
  document.getElementById('npEditMode').classList.remove('hidden');
  document.getElementById('npViewMode').classList.add('hidden');

  pop.classList.remove('hidden');
  positionPopover(pop, rect);
  setTimeout(() => document.getElementById('npInput').focus(), 30);
}

// Open an existing note in read mode (anchored to its highlight element).
function openNoteView(noteEl) {
  const nid = noteEl.dataset.noteId;
  const note = (state.currentData?.notes || []).find(n => n.id === nid);
  if (!note) return;

  beginVocabAudioPause();
  hideSelectionToolbar({ resumeAudio: false });
  state.viewingNote = note;
  state.notePending = null;
  state.editingNote = null;

  const pop = document.getElementById('notePopover');
  document.getElementById('npQuote').textContent = note.quote;
  document.getElementById('npBody').textContent = note.note;
  document.getElementById('npEditMode').classList.add('hidden');
  document.getElementById('npViewMode').classList.remove('hidden');

  pop.classList.remove('hidden');
  positionPopover(pop, noteEl.getBoundingClientRect());
}

// View mode → edit mode for the current note.
function editCurrentNote() {
  if (!state.viewingNote) return;
  state.editingNote = state.viewingNote;
  document.getElementById('npInput').value = state.viewingNote.note;
  document.getElementById('npEditMode').classList.remove('hidden');
  document.getElementById('npViewMode').classList.add('hidden');
  setTimeout(() => document.getElementById('npInput').focus(), 30);
}

async function saveNote() {
  const body = document.getElementById('npInput').value.trim();
  if (!body) { showToast('请输入笔记内容'); return; }

  let payload;
  if (state.editingNote) {
    payload = { id: state.editingNote.id, note: body };
  } else if (state.notePending) {
    const p = state.notePending;
    payload = { segment_id: p.segmentId, quote: p.word, note: body, start_offset: p.startOffset, end_offset: p.endOffset };
  } else {
    return;
  }

  const r = await API.put(`/api/listening_review/project/${state.currentProject.id}/note`, payload);
  if (r.success && r.data) {
    state.currentData = r.data;
    renderLyrics();
    refreshNotesView();
    updateNotesButton();
    showToast('笔记已保存');
  } else if (r.error) {
    showToast(r.error);
  }
  hideNotePopover();
}

async function deleteNote() {
  const target = state.editingNote || state.viewingNote;
  if (!target) return;
  const r = await API.del(`/api/listening_review/project/${state.currentProject.id}/note/${target.id}`);
  if (r.success && r.data) {
    state.currentData = r.data;
    renderLyrics();
    refreshNotesView();
    updateNotesButton();
    showToast('笔记已删除');
  }
  hideNotePopover();
}

function hideNotePopover({ resumeAudio = true } = {}) {
  document.getElementById('notePopover').classList.add('hidden');
  state.notePending = null;
  state.viewingNote = null;
  state.editingNote = null;
  if (resumeAudio) endVocabAudioPause();
}

document.getElementById('npInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); saveNote(); }
  if (e.key === 'Escape') { e.preventDefault(); hideNotePopover(); }
});

// ===================================================================
//  Notes Article View (single article — context-first 批注稿)
// ===================================================================
function updateNotesButton() {
  const n = (state.currentData?.notes || []).length + (state.currentData?.vocab_annotations || []).length;
  const el = document.getElementById('notesCount');
  if (el) el.textContent = n > 0 ? `(${n})` : '';
}

function openNotesView() {
  const v = document.getElementById('notesView');
  v.classList.remove('hidden');
  setNotesFilter(state.notesFilter || 'all');
  requestAnimationFrame(() => {
    document.getElementById('notesViewOverlay').classList.remove('opacity-0');
    const card = document.getElementById('notesViewCard');
    card.classList.remove('opacity-0', 'scale-95');
  });
}

function closeNotesView() {
  document.getElementById('notesViewOverlay').classList.add('opacity-0');
  document.getElementById('notesViewCard').classList.add('opacity-0', 'scale-95');
  setTimeout(() => document.getElementById('notesView').classList.add('hidden'), 300);
}

function refreshNotesView() {
  if (!document.getElementById('notesView').classList.contains('hidden')) renderNotesView();
}

function setNotesFilter(f) {
  state.notesFilter = f;
  document.querySelectorAll('.notes-filter-btn').forEach(b => {
    const active = b.dataset.filter === f;
    b.classList.toggle('bg-blue-500', active);
    b.classList.toggle('text-white', active);
    b.classList.toggle('border-blue-500', active);
    b.classList.toggle('bg-slate-50', !active);
    b.classList.toggle('text-slate-500', !active);
    b.classList.toggle('border-slate-200', !active);
  });
  renderNotesView();
}

// Render a sentence with one entry's span highlighted (no tooltip — for reading).
function renderSentenceWithSpan(text, start, end, kind) {
  if (text == null) return '';
  const s = Math.max(0, Math.min(start ?? 0, text.length));
  const e = Math.max(s, Math.min(end ?? 0, text.length));
  const cls = kind === 'note' ? 'ctx-mark note' : 'ctx-mark vocab';
  return esc(text.substring(0, s)) + `<span class="${cls}">` + esc(text.substring(s, e)) + '</span>' + esc(text.substring(e));
}

function renderNotesView() {
  const body = document.getElementById('notesViewBody');
  const countEl = document.getElementById('notesViewCount');
  document.getElementById('notesViewTitle').textContent = state.currentProject?.title || '本篇笔记';

  const segMap = {};
  (state.currentData?.segments || []).forEach(s => { segMap[s.id] = s; });

  const mk = (kind, a) => {
    const seg = segMap[a.segment_id] || {};
    return {
      kind, id: a.id, segId: a.segment_id,
      quote: kind === 'note' ? a.quote : a.word,
      body:  kind === 'note' ? a.note  : a.meaning,
      startOff: a.start_offset, endOff: a.end_offset,
      start: seg.start ?? 0, sentence: seg.text || ''
    };
  };
  const notes = (state.currentData?.notes || []).map(n => mk('note', n));
  const vocab = (state.currentData?.vocab_annotations || []).map(v => mk('vocab', v));

  const all = [...notes, ...vocab].sort((a, b) => a.start - b.start || a.startOff - b.startOff);
  countEl.textContent = `${notes.length} 条笔记 · ${vocab.length} 个生词释义`;

  const f = state.notesFilter;
  const items = all.filter(it => f === 'all' || it.kind === f);

  if (items.length === 0) {
    const tip = f === 'vocab' ? '还没有生词释义' : f === 'note' ? '还没有笔记' : '还没有任何标注';
    body.innerHTML = `
      <div class="text-center py-16 text-slate-300 text-sm">
        <div class="text-4xl mb-3">&#128221;</div>
        ${tip}<br>
        <span class="text-xs">在正文里选中词或句子，即可添加</span>
      </div>`;
    return;
  }

  body.innerHTML = items.map(it => {
    const isNote = it.kind === 'note';
    const tag = isNote
      ? '<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-100 text-amber-700">笔记</span>'
      : '<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-blue-100 text-blue-700">生词</span>';
    const accent = isNote ? 'bg-amber-300' : 'bg-blue-300';
    const editBtn = isNote
      ? `<button onclick="editNoteFromView('${it.id}')" title="编辑" class="w-6 h-6 rounded flex items-center justify-center text-slate-400 hover:text-blue-500 hover:bg-blue-50 border-none bg-transparent cursor-pointer text-xs">&#9998;</button>`
      : '';
    const sentenceHtml = renderSentenceWithSpan(it.sentence, it.startOff, it.endOff, it.kind);
    return `
      <article class="group py-4 border-b border-slate-100 last:border-0 first:pt-0">
        <div class="flex items-center gap-2 mb-2">
          ${tag}
          <button onclick="jumpToNote(${it.segId})" class="text-[11px] text-slate-400 hover:text-blue-500 font-mono border-none bg-transparent cursor-pointer p-0 inline-flex items-center gap-1" title="跳到音频此处">&#9655; ${formatTime(it.start)}</button>
          <div class="ml-auto flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
            ${editBtn}
            <button onclick="deleteFromView('${it.kind}','${it.id}')" title="删除" class="w-6 h-6 rounded flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 border-none bg-transparent cursor-pointer text-base leading-none">&times;</button>
          </div>
        </div>
        <p class="text-[15px] md:text-base leading-[1.9] text-slate-700 select-text">${sentenceHtml}</p>
        <div class="mt-2.5 flex gap-2.5">
          <div class="w-[3px] rounded-full ${accent} flex-shrink-0"></div>
          <div class="text-[13.5px] text-slate-600 leading-relaxed whitespace-pre-wrap break-words flex-1 pt-0.5">${esc(it.body)}</div>
        </div>
      </article>`;
  }).join('');
}

function jumpToNote(segId) {
  closeNotesView();
  const seg = state.currentData?.segments.find(s => s.id === segId);
  if (!seg) return;
  audioEl.currentTime = seg.start;
  state.activeSegmentId = segId;
  highlightSegment(segId);
}

function editNoteFromView(noteId) {
  closeNotesView();
  const el = document.querySelector(`.note-mark[data-note-id="${noteId}"]`);
  if (!el) return;
  el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  setTimeout(() => { openNoteView(el); editCurrentNote(); }, 320);
}

async function deleteFromView(kind, id) {
  const url = kind === 'note'
    ? `/api/listening_review/project/${state.currentProject.id}/note/${id}`
    : `/api/listening_review/project/${state.currentProject.id}/vocab/${id}`;
  const r = await API.del(url);
  if (r.success && r.data) {
    state.currentData = r.data;
    renderLyrics();
    renderNotesView();
    updateNotesButton();
    showToast('已删除');
  }
}

document.getElementById('notesViewOverlay').addEventListener('click', closeNotesView);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !document.getElementById('notesView').classList.contains('hidden')) {
    closeNotesView();
  }
});

// ===================================================================
//  Audio Player
// ===================================================================
audioEl.addEventListener('timeupdate', () => {
  if (!state.currentData) return;
  const t = audioEl.currentTime;
  updateProgressBar(t);

  const segs = state.currentData.segments;
  let newActive = -1;
  for (const seg of segs) {
    if (t >= seg.start && t < seg.end) { newActive = seg.id; break; }
  }
  if (newActive === -1 && segs.length > 0) {
    for (let i = segs.length - 1; i >= 0; i--) {
      if (t >= segs[i].start) { newActive = segs[i].id; break; }
    }
  }

  if (newActive !== state.activeSegmentId && newActive >= 0) {
    state.activeSegmentId = newActive;
    highlightSegment(newActive);
  }
});

audioEl.addEventListener('play',  () => { document.getElementById('playBtn').innerHTML = '&#10074;&#10074;'; });
audioEl.addEventListener('pause', () => { document.getElementById('playBtn').innerHTML = '&#9654;'; });
audioEl.addEventListener('loadedmetadata', () => {
  document.getElementById('totTime').textContent = formatTime(audioEl.duration);
  audioEl.playbackRate = state.playbackRate;
});

function togglePlay() {
  markVocabAudioManualOverride();
  audioEl.paused ? audioEl.play() : audioEl.pause();
}

function updateProgressBar(t) {
  const dur = audioEl.duration || 1;
  const pct = (t / dur) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressThumb').style.left = pct + '%';
  document.getElementById('curTime').textContent = formatTime(t);
}

function highlightSegment(segId) {
  const container = document.getElementById('lyricsContainer');
  container.querySelectorAll('.lyrics-line.active').forEach(el => el.classList.remove('active'));
  const lineEl = container.querySelector(`.lyrics-line[data-seg-id="${segId}"]`);
  if (!lineEl) return;

  lineEl.classList.add('active');

  // Scroll to center between top bar and player bar
  const topH = document.getElementById('topBar').offsetHeight;
  const bottomH = document.getElementById('playerBar').offsetHeight;
  const visibleH = window.innerHeight - topH - bottomH;
  const targetY = lineEl.getBoundingClientRect().top + window.scrollY - topH - visibleH / 2 + lineEl.offsetHeight / 2;
  window.scrollTo({ top: Math.max(0, targetY), behavior: 'smooth' });
}

function seekToSegment(segId) {
  const seg = state.currentData.segments.find(s => s.id === segId);
  if (!seg) return;
  audioEl.currentTime = seg.start;
  if (audioEl.paused) audioEl.play();
  state.activeSegmentId = segId;
  highlightSegment(segId);
}

// Progress bar interaction
(function initProgressBar() {
  const wrap = document.getElementById('progressWrap');
  let dragging = false;

  function seekFromEvent(e) {
    const rect = wrap.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (audioEl.duration) audioEl.currentTime = ratio * audioEl.duration;
  }

  wrap.addEventListener('mousedown', (e) => { dragging = true; seekFromEvent(e); });
  document.addEventListener('mousemove', (e) => { if (dragging) seekFromEvent(e); });
  document.addEventListener('mouseup', () => { dragging = false; });

  wrap.addEventListener('touchstart',  (e) => { dragging = true; seekFromEvent(e.touches[0]); }, { passive: true });
  wrap.addEventListener('touchmove',   (e) => { if (dragging) seekFromEvent(e.touches[0]); }, { passive: true });
  wrap.addEventListener('touchend',    ()  => { dragging = false; });
})();

// Speed control
function setSpeed(rate) {
  state.playbackRate = rate;
  audioEl.playbackRate = rate;
  document.querySelectorAll('.speed-btn').forEach(b => {
    const isActive = parseFloat(b.dataset.rate) === rate;
    b.classList.toggle('bg-blue-500', isActive);
    b.classList.toggle('text-white', isActive);
    b.classList.toggle('border-blue-500', isActive);
    b.classList.toggle('bg-slate-50', !isActive);
    b.classList.toggle('text-slate-500', !isActive);
    b.classList.toggle('border-slate-200', !isActive);
    b.classList.toggle('hover:bg-slate-100', !isActive);
  });
}

// ===================================================================
//  Star Toggle
// ===================================================================
async function toggleStar(segId) {
  if (!state.currentProject) return;
  const r = await API.put(`/api/listening_review/project/${state.currentProject.id}/star`, { segment_id: segId });
  if (!r.success) return;

  state.currentData.starred_segments = r.starred_segments;
  const lineEl = document.querySelector(`.lyrics-line[data-seg-id="${segId}"]`);
  if (!lineEl) return;

  const isStarred = r.starred_segments.includes(segId);
  lineEl.classList.toggle('starred', isStarred);
  const btn = lineEl.querySelector('.star-btn');
  if (btn) {
    btn.textContent = isStarred ? '\u2605' : '\u2606';
    btn.classList.toggle('text-amber-400', isStarred);
    btn.classList.toggle('opacity-100', isStarred);
    btn.classList.toggle('text-slate-300', !isStarred);
  }
}

// ===================================================================
//  Mastered & Check-in
// ===================================================================
async function toggleMastered() {
  if (!state.currentProject) return;
  const r = await API.put(`/api/listening_review/project/${state.currentProject.id}/mastered`, {});
  if (!r.success) { showToast(r.error || '操作失败'); return; }
  state.currentProject.mastered = r.mastered;
  const proj = state.projects.find(p => p.id === state.currentProject.id);
  if (proj) proj.mastered = r.mastered;
  updateMasteredBtn(r.mastered);
  showToast(r.mastered ? '已标记为掌握' : '已取消标熟');
}

function updateMasteredBtn(mastered) {
  const btn = document.getElementById('masteredBtn');
  if (!btn) return;
  if (mastered) {
    btn.innerHTML = '&#10003; 已掌握';
    btn.className = btn.className.replace(/bg-slate-100 text-slate-500/g, '').replace(/bg-emerald-50 text-emerald-600/g, '');
    btn.classList.add('bg-emerald-50', 'text-emerald-600');
    btn.classList.remove('bg-slate-100', 'text-slate-500');
  } else {
    btn.innerHTML = '&#10003; 标熟';
    btn.classList.remove('bg-emerald-50', 'text-emerald-600');
    btn.classList.add('bg-slate-100', 'text-slate-500');
  }
}

async function doCheckin() {
  if (!state.currentProject) return;
  const r = await API.post(`/api/listening_review/project/${state.currentProject.id}/checkin`, {});
  if (!r.success) { showToast(r.error || '操作失败'); return; }
  state.currentProject.checkin_count = r.checkin_count;
  const proj = state.projects.find(p => p.id === state.currentProject.id);
  if (proj) proj.checkin_count = r.checkin_count;
  updateCheckinBtn(r.checkin_count);
  showToast(`打卡成功！已打卡 ${r.checkin_count} 次`);
}

function updateCheckinBtn(count) {
  const span = document.getElementById('checkinCount');
  if (span) span.textContent = count > 0 ? `(${count})` : '';
}

// ===================================================================
//  Keyboard Shortcuts
// ===================================================================
document.addEventListener('keydown', (e) => {
  if (state.view !== 'detail') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowLeft')  { e.preventDefault(); audioEl.currentTime = Math.max(0, audioEl.currentTime - 3); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); audioEl.currentTime = Math.min(audioEl.duration || 0, audioEl.currentTime + 3); }
});

// ===================================================================
//  Utilities
// ===================================================================
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('toast-show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('toast-show'), 3000);
}

// Close modal on overlay click
document.getElementById('uploadModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('uploadModal')) closeUploadModal();
});

// Drag & drop on file label
(function initDragDrop() {
  const label = document.getElementById('fileDropLabel');
  ['dragenter', 'dragover'].forEach(ev => {
    label.addEventListener(ev, (e) => { e.preventDefault(); label.classList.add('border-blue-500', 'bg-blue-50'); });
  });
  ['dragleave', 'drop'].forEach(ev => {
    label.addEventListener(ev, (e) => { e.preventDefault(); label.classList.remove('border-blue-500', 'bg-blue-50'); });
  });
  label.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    if (file) {
      const input = document.getElementById('fileInput');
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      onFileSelected(input);
    }
  });
})();
